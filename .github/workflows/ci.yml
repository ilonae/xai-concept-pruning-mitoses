name: RAG Pipeline CI

on:
  push:
    branches: [main, feat/rag-integration]
    paths:
      - "rag/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, feat/rag-integration]
    paths:
      - "rag/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Dependency cache ────────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('rag/requirements_rag.txt') }}
          restore-keys: pip-${{ runner.os }}-

      # Cache the multilingual embedding model (~270 MB) so it is only
      # downloaded on the first run or when the model name changes.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-paraphrase-multilingual-MiniLM-L12-v2
          restore-keys: hf-

      # ── Install ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r rag/requirements_rag.txt ruff

      # ── Lint ────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check rag/ --ignore E501

      # ── Unit tests ──────────────────────────────────────────────────────
      - name: Unit tests — explain.py
        working-directory: rag
        run: pytest tests/test_explain.py -v --tb=short

      - name: Unit tests — pipeline.py
        working-directory: rag
        run: pytest tests/test_pipeline.py -v --tb=short

      # ── Retrieval quality gate ───────────────────────────────────────────
      # This is the CI quality gate: hit rate must be >= 80%, MRR >= 0.60.
      # A failure here means a change to chunking, embeddings, or fixtures
      # has degraded retrieval — not just a code error.
      - name: Retrieval quality gate
        working-directory: rag
        run: pytest tests/test_retrieval_quality.py -v --tb=short
