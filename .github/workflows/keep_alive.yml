name: Keep Streamlit app alive

on:
  schedule:
    # Ping every 3 days at 08:00 UTC — Streamlit Cloud sleeps after ~7 days of inactivity
    - cron: "0 8 */3 * *"
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://xai-concept-pruning-mitoses-ug7bxicybwkp7mu5yj8pwa.streamlit.app/
